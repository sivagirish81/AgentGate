name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agentgate/requirements.txt

      - name: Compile check
        run: |
          python -m py_compile agentgate/app/*.py

      - name: Run tests if present
        run: |
          if [ -d agentgate/tests ]; then
            python -m pytest -q
          else
            echo "No tests found."
          fi
