# Kubernetes RBAC: remediation access for rollout restart
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentgate-remediator
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentgate-remediator
  namespace: default
subjects:
  - kind: Group
    name: agentgate-remediator
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: agentgate-remediator
  apiGroup: rbac.authorization.k8s.io
